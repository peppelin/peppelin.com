name: Deploy to S3 and Invalidate CloudFront

on:
  push:
    branches:
      - main  # o la rama que uses para desplegar

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: AWS

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 # Actualizado a la versión estable v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync files to S3
        run: |
          # Apuntamos el sync directamente a la carpeta ./public para que suba el contenido a la raíz de S3
          aws s3 sync ./public s3://${{ vars.S3_BUCKET }} --delete --exclude ".git/*" --exclude ".github/*" --exclude "static/invitaciones/*"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ vars.DISTRIBUTION_ID }} --paths "/*"